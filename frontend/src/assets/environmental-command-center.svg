      .command-chart { stroke-dasharray: 520; animation: command-draw 5.5s ease-in-out infinite alternate; }
      @keyframes command-flow { to { stroke-dashoffset:-170; } }
      @keyframes command-pulse { 0%,100% { opacity:.45; } 50% { opacity:1; } }
      @keyframes command-draw { from { stroke-dashoffset:100; } to { stroke-dashoffset:0; } }
      @media (prefers-reduced-motion: reduce) { .command-path,.command-dot,.command-chart { animation:none; } }

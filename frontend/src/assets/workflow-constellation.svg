<svg width="1100" height="360" viewBox="0 0 1100 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primary-flow" x1="90" y1="116" x2="1015" y2="116" gradientUnits="userSpaceOnUse"><stop stop-color="#22D3EE"/><stop offset=".54" stop-color="#34D399"/><stop offset="1" stop-color="#60A5FA"/></linearGradient>
    <linearGradient id="proof-flow" x1="414" y1="270" x2="954" y2="270" gradientUnits="userSpaceOnUse"><stop stop-color="#C4B5FD"/><stop offset="1" stop-color="#7C3AED"/></linearGradient>
    <filter id="constellation-glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="9"/></filter>
    <style>
      .flow-line { stroke-dasharray:7 12; animation: constellation-flow 9s linear infinite; }
      .proof-line { animation-duration:13s; animation-direction:reverse; }
      .star-node { transform-box:fill-box; transform-origin:center; animation:constellation-pulse 4.5s ease-in-out infinite; }
      .star-node:nth-of-type(2) { animation-delay:-.9s; }.star-node:nth-of-type(3) { animation-delay:-1.8s; }.star-node:nth-of-type(4) { animation-delay:-2.7s; }.star-node:nth-of-type(5) { animation-delay:-3.6s; }
      @keyframes constellation-flow { to { stroke-dashoffset:-190; } }
      @keyframes constellation-pulse { 0%,100% { opacity:.55; transform:scale(.9); } 50% { opacity:1; transform:scale(1.08); } }
      @media (prefers-reduced-motion:reduce) { .flow-line,.star-node { animation:none; } }
    </style>
  </defs>
  <g opacity=".28" fill="#A5F3FC"><circle cx="52" cy="42" r="1"/><circle cx="170" cy="304" r="1"/><circle cx="346" cy="38" r="1"/><circle cx="742" cy="38" r="1"/><circle cx="1039" cy="310" r="1"/><circle cx="996" cy="54" r="1"/></g>

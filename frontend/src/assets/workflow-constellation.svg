  <path d="M550 153v78" stroke="#64748B" stroke-opacity=".34" stroke-dasharray="3 8"/>
  <rect x="483" y="181" width="134" height="26" rx="13" fill="#0B1424" stroke="#94A3B8" stroke-opacity=".16"/><path d="M505 194h90" stroke="#94A3B8" stroke-opacity=".35" stroke-width="4" stroke-linecap="round"/>
  <g opacity=".3" filter="url(#constellation-glow)"><circle cx="111" cy="116" r="22" fill="#22D3EE"/><circle cx="550" cy="116" r="26" fill="#34D399"/><circle cx="989" cy="116" r="22" fill="#60A5FA"/><circle cx="444" cy="270" r="20" fill="#A78BFA"/><circle cx="944" cy="270" r="20" fill="#8B5CF6"/></g>
  <g fill="#06131F" stroke-width="1.5">
    <circle cx="111" cy="116" r="34" stroke="#22D3EE"/><circle cx="330" cy="116" r="34" stroke="#67E8F9"/><circle cx="550" cy="116" r="38" stroke="#34D399"/><circle cx="770" cy="116" r="34" stroke="#38BDF8"/><circle cx="989" cy="116" r="34" stroke="#60A5FA"/>
